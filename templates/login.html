{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
    <h2>Student Login</h2>
    <p>Access the Daily Multi-College Student Quiz</p>

    <form method="POST" action="{{ url_for('student_login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn">Login</button>
        <div class="link-group" style="justify-content: center; margin-top: 1.5rem; flex-direction: column; text-align: center; gap: 0.8rem;">
            <a href="{{ url_for('register') }}" style="color: #60a5fa; text-decoration: none;">New student? Register here.</a>
            <a href="{{ url_for('admin_login') }}" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem;">🏫 Admin & Faculty Login</a>
        </div>
    </form>
</div>
{% endblock %}
