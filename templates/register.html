{% extends "base.html" %}

{% block content %}
<div class="glass-panel glass-panel-large">
    <h2>Student Registration</h2>
    <p>Join the Daily Multi-College Student Quiz</p>

    <form method="POST" action="{{ url_for('register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="profile-grid">
            <div class="form-group">
                <label for="name">Student Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="father_name">Father’s Name</label>
                <input type="text" id="father_name" name="father_name" required>
            </div>
            <div class="form-group">
                <label for="father_phone">Father’s Phone Number</label>
                <input type="text" id="father_phone" name="father_phone" required>
            </div>
            
            <div class="form-group">
                <label for="college_location">College Location</label>
                <input type="text" id="college_location" name="college_location" required>
            </div>
            <div class="form-group">
                <label for="inter_college">Intermediate College Name</label>
                <input type="text" id="inter_college" name="inter_college" required>
            </div>
            <div class="form-group">
                <label for="school">School Name</label>
                <input type="text" id="school" name="school" required>
            </div>
            <div class="form-group">
                <label for="eamcet_reg">EAMCET Hall Ticket Number</label>
                <input type="text" id="eamcet_reg" name="eamcet_reg" required>
            </div>
        </div>

        <div class="form-group">
            <label for="address">Home Address</label>
            <input type="text" id="address" name="address" required>
        </div>
        
        <div class="profile-grid">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
        </div>

        <button type="submit" class="btn">Register Profile</button>
        
        <div class="link-group" style="justify-content: center;">
            <a href="{{ url_for('student_login') }}" style="color: #60a5fa; text-decoration: none;">Already registered? Login here.</a>
        </div>
    </form>
</div>
{% endblock %}
