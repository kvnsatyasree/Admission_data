{% extends "base.html" %}

{% block content %}
<div class="glass-panel" style="background: rgba(15, 23, 42, 0.85); border: 1px solid #94a3b8;">
    <h2>Admin Portal</h2>
    <p>Staff Access Only</p>

    <form method="POST" action="{{ url_for('admin_login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="passkey">System Passkey</label>
            <input type="password" id="passkey" name="passkey" required>
        </div>

        <button type="submit" class="btn" style="background: linear-gradient(135deg, #475569, #1e293b);">Authenticate</button>
        
        <div class="link-group" style="justify-content: center; margin-top: 1.5rem;">
            <a href="{{ url_for('landing_page') }}" style="color: #94a3b8; text-decoration: none;">Return Home</a>
        </div>
    </form>
</div>
{% endblock %}
